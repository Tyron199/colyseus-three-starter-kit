<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎮</text></svg>" />
    <title>Colyseus + Three.js Starter Kit</title>
  </head>
  <body>
    <div id="join">
      <div id="join-card">
        <div class="eyebrow">Multiplayer 3D starter kit</div>
        <h1>Colyseus + Three.js</h1>
        <p class="tagline">Authoritative Colyseus server, Three.js client, end-to-end typed. Enter a name to join the shared room.</p>

        <label class="field">
          <span>Your name</span>
          <input id="name-input" maxlength="16" placeholder="Guest" autocomplete="off" />
        </label>

        <button id="play">Play</button>

        <div id="join-error" class="hidden"></div>
      </div>
    </div>

    <div id="hud" class="hidden">
      <div id="status"></div>
      <div id="player-count"></div>
      <div class="hint">WASD / arrow keys (input is captured — wire it up server-side)</div>
      <button id="leave-button">Leave</button>
    </div>

    <div id="overlay" class="hidden">
      <div id="overlay-message"></div>
      <button id="overlay-button" class="hidden">Back to start</button>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
